<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
</head>
<body>
    <h1>{{ heading }}</h1>
    
    {% if not is_logged %}
        {% if message %}
            <p style="color:red;">{{ message }}</p>
        {% endif %}
        <!-- Форма авторизации -->
        <form method="POST" action="/">
            <label>Логин:</label>
            <input type="text" name="username" required><br><br>
            <label>Пароль:</label>
            <input type="password" name="password" required><br><br>
            <button type="submit">Войти</button>
        </form>
    {% else %}
        <!-- Контент админки -->
        <p>{{ message }}</p>
        <p>Здесь должен быть функционал управления, который не доделали.</p>
        <a href="/logout">Выйти</a>
    {% endif %}
</body>
</html>
